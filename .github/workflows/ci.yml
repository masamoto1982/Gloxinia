name: Build check

# Verifies the Rust → WASM module and the TypeScript/Vite frontend compile.
# Runs on pull requests and branch pushes; the actual Pages deploy lives in
# deploy.yml and only runs on main.

on:
  pull_request:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.100

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build (wasm + typescript + vite)
        working-directory: web
        run: npm run build
